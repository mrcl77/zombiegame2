name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-x86_64
            os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            bin: zombiegame2
            archive: tar.gz
          - name: macos-aarch64
            os: macos-latest
            triple: aarch64-apple-darwin
            bin: zombiegame2
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            bin: zombiegame2.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.target.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target.name }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target.triple }}

      - name: Stage artifact (Unix)
        if: matrix.target.os != 'windows-latest'
        shell: bash
        run: |
          STAGE="zombiegame2-${{ matrix.target.name }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target.triple }}/release/${{ matrix.target.bin }}" "$STAGE/"
          cp -r assets "$STAGE/"
          cp README.md "$STAGE/"
          tar -czf "$STAGE.tar.gz" "$STAGE"
          echo "ASSET_PATH=$STAGE.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Stage artifact (Windows)
        if: matrix.target.os == 'windows-latest'
        shell: pwsh
        run: |
          $stage = "zombiegame2-${{ matrix.target.name }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target.triple }}/release/${{ matrix.target.bin }}" -Destination $stage
          Copy-Item -Recurse assets -Destination $stage
          Copy-Item README.md -Destination $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ASSET_PATH=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_NAME=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish rolling "latest" release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Recreate "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Usuwamy poprzedni rolling release i przypięty do niego tag,
          # aby nowo utworzony zawsze był oznaczony jako "Latest".
          gh release delete latest --repo "$REPO" --yes --cleanup-tag || true

          SHORT_SHA="${SHA:0:7}"
          gh release create latest \
            --repo "$REPO" \
            --target "$SHA" \
            --title "Latest build ($SHORT_SHA)" \
            --notes "Automatyczny build z gałęzi \`main\` — commit \`$SHORT_SHA\`.

          Pobierz paczkę dla swojego systemu, rozpakuj i uruchom binarkę \`zombiegame2\` (\`zombiegame2.exe\` na Windowsie). Katalog \`assets/\` musi pozostać obok binarki." \
            dist/*
