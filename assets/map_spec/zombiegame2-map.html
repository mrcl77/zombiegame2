<script type="text/babel" data-presets="env,react">
const { useState, useMemo } = React;

/* ============================================================
   PROCEDURAL CITY BUILDER — generates realistic plot layout
   per segment: streets with sidewalks, building plots set back
   from roads with front yards / parking.

const SEGMENTS_META = [
  { id: 1, name: "Suburbs",             pl_name: "Przedmieścia",          difficulty: 1, status: "unlocked", unlock_condition: "(start)",                                          theme_color: "#3a5a28", theme: "suburb"   },
  { id: 2, name: "Downtown",            pl_name: "Centrum miasta",        difficulty: 2, status: "locked",   unlock_condition: "Clear segment 1 (kill 80% zombies)",               theme_color: "#5a5a5a", theme: "downtown" },
  { id: 3, name: "Industrial",          pl_name: "Dzielnica przemysłowa", difficulty: 3, status: "locked",   unlock_condition: "Find factory keycard in segment 2",                theme_color: "#6b3a1a", theme: "industrial"},
  { id: 4, name: "Hospital & Park",     pl_name: "Szpital i Park",        difficulty: 4, status: "locked",   unlock_condition: "Repair generator in segment 3",                    theme_color: "#3a5a7a", theme: "hospital" },
  { id: 5, name: "Military Checkpoint", pl_name: "Wojskowy checkpoint",   difficulty: 5, status: "locked",   unlock_condition: "Obtain military access codes in segment 4",        theme_color: "#5a6b2a", theme: "military" },
];

// Deterministic PRNG
const mulberry32 = (a) => () => {
  a = (a + 0x6d2b79f5) | 0;
  let t = a;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
};

// Each segment is 48x48 tiles. Two-axis road grid with sidewalks.
// Roads at rows 22-25 (horizontal) and cols 22-25 (vertical).
// This divides each segment into 4 quadrants. Plots sit inside quadrants
// with 1-tile sidewalk buffer.

const ROAD_H_TOP = 22, ROAD_H_BOT = 25;
const ROAD_V_LEFT = 22, ROAD_V_RIGHT = 25;

// Quadrant rectangles (inside each segment) where buildings can go.
// Leave 1-tile border touching the road for sidewalk access.
const QUADRANTS = [
  { x: 0,  y: 0,  w: 21, h: 21 }, // NW
  { x: 26, y: 0,  w: 22, h: 21 }, // NE
  { x: 0,  y: 26, w: 21, h: 22 }, // SW
  { x: 26, y: 26, w: 22, h: 22 }, // SE
];

// Building archetypes per theme. Each has size range and type.
const ARCHETYPES = {

    { type: "house",    name: "House",             w: [7, 9],   h: [6, 8],   weight: 6, roof: "gable" },
    { type: "house",    name: "Bungalow",          w: [6, 8],   h: [5, 6],   weight: 4, roof: "gable" },
    { type: "shed",     name: "Garden Shed",       w: [3, 4],   h: [3, 4],   weight: 3, roof: "gable" },
    { type: "garage",   name: "Garage",            w: [4, 5],   h: [4, 5],   weight: 2, roof: "flat" },
    { type: "shop",     name: "Corner Mart",       w: [5, 7],   h: [6, 7],   weight: 1, roof: "flat" },
  ],
  downtown: [

    { type: "church",   name: "Church",            w: [8, 10],  h: [12, 14], weight: 1, roof: "gable" },
    { type: "apartment",name: "Apartment Block",   w: [9, 12],  h: [10, 13], weight: 4, roof: "apt" },
    { type: "apartment",name: "Tenement",          w: [8, 10],  h: [9, 11],  weight: 3, roof: "apt" },
    { type: "shop",     name: "Shop",              w: [5, 7],   h: [6, 7],   weight: 3, roof: "flat" },
    { type: "shop",     name: "Pharmacy",          w: [6, 8],   h: [6, 8],   weight: 2, roof: "flat" },
    { type: "shop",     name: "Bakery",            w: [5, 7],   h: [5, 7],   weight: 2, roof: "flat" },
    { type: "market",   name: "Market Hall",       w: [10, 12], h: [7, 9],   weight: 1, roof: "gable" },
    { type: "bank",     name: "Bank",              w: [6, 8],   h: [7, 9],   weight: 1, roof: "flat" },
    { type: "tower",    name: "Office Block",      w: [7, 9],   h: [7, 9],   weight: 2, roof: "flat" },
  ],
  industrial: [
    { type: "factory",  name: "Factory Hall",      w: [14, 18], h: [11, 14], weight: 2, roof: "saw" },
    { type: "warehouse",name: "Warehouse",         w: [10, 14], h: [8, 11],  weight: 3, roof: "flat" },
    { type: "depot",    name: "Truck Depot",       w: [12, 16], h: [9, 11],  weight: 1, roof: "flat" },
    { type: "shed",     name: "Generator Shed",    w: [4, 5],   h: [4, 5],   weight: 1, roof: "flat" },
    { type: "tank",     name: "Storage Tank",      w: [5, 6],   h: [5, 6],   weight: 2, roof: "round" },
  ],
  hospital: [
    { type: "hospital", name: "Hospital Wing",     w: [12, 18], h: [10, 14], weight: 2, roof: "flat" },
    { type: "hospital", name: "Hospital Annex",    w: [9, 12],  h: [7, 9],   weight: 2, roof: "flat" },
    { type: "morgue",   name: "Morgue",            w: [6, 7],   h: [5, 7],   weight: 1, roof: "flat" },
    { type: "garage",   name: "Ambulance Bay",     w: [8, 10],  h: [5, 7],   weight: 1, roof: "flat" },
    { type: "park",     name: "Park Pavilion",     w: [5, 7],   h: [4, 6],   weight: 2, roof: "gable" },
    { type: "shed",     name: "Toilet Block",      w: [3, 4],   h: [3, 4],   weight: 1, roof: "flat" },
  ],
  military: [
    { type: "bunker",   name: "Bunker",            w: [10, 14], h: [10, 14], weight: 1, roof: "flat" },
    { type: "tent",     name: "Command Tent",      w: [5, 7],   h: [5, 7],   weight: 1, roof: "tent" },
    { type: "tent",     name: "Barracks Tent",     w: [5, 7],   h: [5, 7],   weight: 2, roof: "tent" },
    { type: "tent",     name: "Supply Tent",       w: [5, 7],   h: [5, 7],   weight: 1, roof: "tent" },
    { type: "tower",    name: "Watchtower",        w: [4, 5],   h: [4, 5],   weight: 2, roof: "flat" },
    { type: "helipad",  name: "Helipad",           w: [9, 11],  h: [8, 10],  weight: 1, roof: "pad" },
    { type: "shed",     name: "Ammo Crate",        w: [3, 4],   h: [3, 4],   weight: 2, roof: "flat" },
  ],
};

const BUILDING_STYLE = {
  house:     { wall: "#a87b4a", roof: "#8b3a2a", roofDk: "#5a1f15", trim: "#5a3520" },
  shed:      { wall: "#7a5a30", roof: "#5a4030", roofDk: "#2f2017", trim: "#3a2818" },
  gas:       { wall: "#bababa", roof: "#c44a2a", roofDk: "#7a2a18", trim: "#3a3a3a" },
  shop:      { wall: "#a89878", roof: "#5a5a5a", roofDk: "#2a2a2a", trim: "#3a3a3a" },
  apartment: { wall: "#8a7058", roof: "#4a3a2a", roofDk: "#2a1f15", trim: "#3a2818" },
  civic:     { wall: "#bdbdbd", roof: "#7a7a7a", roofDk: "#3a3a3a", trim: "#3a3a3a" },
  church:    { wall: "#9a8870", roof: "#3a3a4a", roofDk: "#1a1a25", trim: "#5a4a3a" },
  market:    { wall: "#a89878", roof: "#8b6a3a", roofDk: "#4a3818", trim: "#3a3a3a" },
  bank:      { wall: "#bdbdbd", roof: "#5a5a5a", roofDk: "#2a2a2a", trim: "#3a3a3a" },
  factory:   { wall: "#7a5a40", roof: "#6b3a1a", roofDk: "#3a1f0e", trim: "#2a2018" },
  warehouse: { wall: "#7a6a50", roof: "#5a3a2a", roofDk: "#2a1a10", trim: "#2a2018" },
  depot:     { wall: "#888880", roof: "#3a3a3a", roofDk: "#1a1a1a", trim: "#2a2018" },
  hospital:  { wall: "#e8eef4", roof: "#a8b8c8", roofDk: "#5a6878", trim: "#1e4d6b" },
  morgue:    { wall: "#bdc8d4", roof: "#7a8a9a", roofDk: "#3a4a5a", trim: "#1e4d6b" },
  park:      { wall: "#8b6f47", roof: "#3e7020", roofDk: "#1f3810", trim: "#2a1810" },
  garage:    { wall: "#888888", roof: "#5a5a5a", roofDk: "#2a2a2a", trim: "#3a3a3a" },
  bunker:    { wall: "#5a5a4a", roof: "#3a4022", roofDk: "#1f2210", trim: "#2a2e18" },
  tent:      { wall: "#3a3a2a", roof: "#5a6b2a", roofDk: "#2f3a14", trim: "#1a1a10" },
  helipad:   { wall: "#3a3a3a", roof: "#2a2a2a", roofDk: "#1a1a1a", trim: "#ffd93d" },
  tower:     { wall: "#7a6a50", roof: "#3a4022", roofDk: "#1f2210", trim: "#2a2e18" },
  tank:      { wall: "#888888", roof: "#666666", roofDk: "#3a3a3a", trim: "#1a1a1a" },
};

// Pack 1-3 buildings into a quadrant. Each plot has its own front yard.
function packQuadrant(quad, theme, rng) {
  const archetypes = ARCHETYPES[theme];
  const buildings = [];
  // Try a few candidate buildings
  const slots = [];
  // Split quadrant into 1-2 columns and 1-2 rows depending on size
  const colCount = quad.w >= 14 ? 2 : 1;
  const rowCount = quad.h >= 14 ? 2 : 1;
  const cellW = Math.floor(quad.w / colCount);
  const cellH = Math.floor(quad.h / rowCount);
  for (let cy = 0; cy < rowCount; cy++) {
    for (let cx = 0; cx < colCount; cx++) {
      // 80% chance to place
      if (rng() < 0.18) continue;
      const cellX = quad.x + cx * cellW;
      const cellY = quad.y + cy * cellH;
      // pick weighted archetype
      const totalW = archetypes.reduce((a,b) => a + b.weight, 0);
      let r = rng() * totalW;
      let arch = archetypes[0];
      for (const a of archetypes) { r -= a.weight; if (r <= 0) { arch = a; break; } }
      const w = Math.min(cellW - 2, arch.w[0] + Math.floor(rng() * (arch.w[1] - arch.w[0] + 1)));
      const h = Math.min(cellH - 2, arch.h[0] + Math.floor(rng() * (arch.h[1] - arch.h[0] + 1)));
      if (w < 3 || h < 3) continue;
      // Position inside the cell with margin (yard)
      const marginX = Math.max(1, Math.floor((cellW - w) / 2));
      const marginY = Math.max(1, Math.floor((cellH - h) / 2));
      const bx = cellX + marginX;
      const by = cellY + marginY;
      // door faces nearest road
      let doorX = bx + Math.floor(w/2);
      let doorY = by + h - 1; // default bottom
      // determine which road is closer
      const distTop = by;
      const distBot = 47 - (by + h);
      const distLeft = bx;
      const distRight = 47 - (bx + w);
      const minD = Math.min(distTop, distBot, distLeft, distRight);
      if (minD === distTop)      { doorY = by;          doorX = bx + Math.floor(w/2); }
      else if (minD === distBot) { doorY = by + h - 1;  doorX = bx + Math.floor(w/2); }
      else if (minD === distLeft){ doorX = bx;          doorY = by + Math.floor(h/2); }
      else                       { doorX = bx + w - 1;  doorY = by + Math.floor(h/2); }
      buildings.push({
        id: "b_" + cellX + "_" + cellY,
        name: arch.name,
        type: arch.type,
        roof: arch.roof,
        x: bx, y: by, w, h,
        doors: [{ x: doorX, y: doorY }],
      });
    }
  }
  return buildings;
}

// Generate a full segment
function generateSegment(meta, seedOffset = 0) {
  const rng = mulberry32(meta.id * 9173 + seedOffset);
  const buildings = [];
  for (const q of QUADRANTS) {
    const bs = packQuadrant(q, meta.theme, rng);
    for (const b of bs) buildings.push(b);
  }
  // === DOWNTOWN: place gas station at the intersection (NE corner of road cross) ===
  // Footprint placed so canopy + pumps (drawn south of store, ~4 tiles) fit between
  // the building and the road — no spillover onto the asphalt.
  if (meta.theme === "downtown") {
    for (let i = buildings.length - 1; i >= 0; i--) {
      if (buildings[i].type === "gas") buildings.splice(i, 1);
    }
    const gx = ROAD_V_RIGHT + 2;   // 27
    const gw = 10, gh = 5;          // shorter so canopy fits below it before the road
    const gy = ROAD_H_TOP - 1 - 4 - gh; // store at y=12, canopy reaches y≈21, road at y=22
    // Remove any overlapping building
    for (let i = buildings.length - 1; i >= 0; i--) {
      const b = buildings[i];
      const overlap = !(b.x + b.w + 1 < gx || b.x > gx + gw + 1 || b.y + b.h + 1 < gy || b.y > gy + gh + 4 + 1);
      if (overlap) buildings.splice(i, 1);
    }
    buildings.push({
      id: "b_gas_intersection",
      name: "Gas Station",
      type: "gas",
      roof: "flat",
      x: gx, y: gy, w: gw, h: gh,
      doors: [{ x: gx, y: gy + gh - 1 }],
      atIntersection: true,
    });
  }
  // Mark special POI buildings (one or two per segment)
  // Tag rare loot bearer
  const specialIdx = buildings.length > 1 ? Math.floor(rng() * buildings.length) : 0;
  if (buildings[specialIdx]) buildings[specialIdx].isSpecial = true;

  // Build occupancy grid for prop placement
  const occ = new Uint8Array(48 * 48);
  // mark roads + sidewalks
  for (let x = 0; x < 48; x++) {
    for (let y = ROAD_H_TOP - 1; y <= ROAD_H_BOT + 1; y++) occ[y*48+x] = 1;
  }
  for (let y = 0; y < 48; y++) {
    for (let x = ROAD_V_LEFT - 1; x <= ROAD_V_RIGHT + 1; x++) occ[y*48+x] = 1;
  }
  // mark buildings + 1-tile padding
  for (const b of buildings) {
    for (let dy = -1; dy <= b.h; dy++) {
      for (let dx = -1; dx <= b.w; dx++) {
        const xx = b.x + dx, yy = b.y + dy;
        if (xx >= 0 && xx < 48 && yy >= 0 && yy < 48) occ[yy*48+xx] = 1;
      }
    }
  }

  // Generate props
  const props = [];
  const tryPlace = (kind, w = 1, h = 1, count = 1, where = "yard") => {
    // where: "yard" (off-road, off-buildings), "road" (on roads), "any"
    let placed = 0, tries = 0;
    while (placed < count && tries < 300) {
      tries++;
      let x, y, isRoad;
      if (where === "road") {
        isRoad = true;
        // pick a road tile
        if (rng() < 0.5) {
          // horizontal road
          x = Math.floor(rng() * (48 - w));
          y = ROAD_H_TOP + Math.floor(rng() * 4);
        } else {
          x = ROAD_V_LEFT + Math.floor(rng() * 4);
          y = Math.floor(rng() * (48 - h));
        }
      } else {
        x = Math.floor(rng() * (48 - w));
        y = Math.floor(rng() * (48 - h));
      }
      // check occupancy
      let ok = true;
      for (let dy = 0; dy < h && ok; dy++) for (let dx = 0; dx < w && ok; dx++) {
        const v = occ[(y+dy)*48 + (x+dx)];
        if (where === "yard" && v !== 0) ok = false;
        if (where === "road") {
          // road allowed only on actual road tiles (not buildings)
          // accept v=1 only if it IS a road position
          const onRoad = ((y+dy) >= ROAD_H_TOP && (y+dy) <= ROAD_H_BOT) ||
                         ((x+dx) >= ROAD_V_LEFT && (x+dx) <= ROAD_V_RIGHT);
          if (v === 2) ok = false;
          if (!onRoad) ok = false;
        }
      }
      if (ok) {
        for (let dy = 0; dy < h; dy++) for (let dx = 0; dx < w; dx++) {
          if (x+dx < 48 && y+dy < 48) occ[(y+dy)*48 + (x+dx)] = 2;
        }
        props.push({ kind, x, y });
        placed++;
      }
    }
  };

  if (meta.theme === "suburb") {
    tryPlace("tree", 1, 1, 36);
    tryPlace("bush", 1, 1, 28);
    tryPlace("hedge-h", 3, 1, 8);
    tryPlace("hedge-v", 1, 3, 8);
    tryPlace("car", 2, 1, 4, "yard");
    tryPlace("car", 2, 1, 3, "road");
    tryPlace("wreck", 2, 1, 2, "road");
    tryPlace("mailbox", 1, 1, 8);
    tryPlace("trash", 1, 1, 6);
    tryPlace("blood", 1, 1, 10);
    tryPlace("lamp", 1, 1, 10);
  } else if (meta.theme === "downtown") {
    tryPlace("tree", 1, 1, 14);
    tryPlace("car", 2, 1, 8, "road");
    tryPlace("wreck", 2, 1, 5, "road");
    tryPlace("bus", 3, 1, 1, "road");
    tryPlace("dumpster", 1, 1, 12);
    tryPlace("lamp", 1, 1, 18);
    tryPlace("bench", 2, 1, 8);
    tryPlace("trash", 1, 1, 14);
    tryPlace("debris", 1, 1, 16);
    tryPlace("blood", 1, 1, 16);
    tryPlace("sign", 1, 1, 6);
    tryPlace("planter", 1, 1, 6);
  } else if (meta.theme === "industrial") {
    tryPlace("truck", 3, 2, 4, "road");
    tryPlace("truck", 3, 2, 3, "yard");
    tryPlace("container", 3, 2, 8);
    tryPlace("container", 2, 3, 5);
    tryPlace("barrels", 1, 1, 22);
    tryPlace("pallet", 1, 1, 18);
    tryPlace("debris", 1, 1, 26);
    tryPlace("blood", 1, 1, 12);
    tryPlace("oil", 1, 1, 8);
    tryPlace("crane", 2, 2, 1);
    tryPlace("forklift", 2, 1, 3);
    tryPlace("crate", 1, 1, 14);
  } else if (meta.theme === "hospital") {
    tryPlace("tree", 1, 1, 38);
    tryPlace("bush", 1, 1, 22);
    tryPlace("hedge-h", 3, 1, 6);
    tryPlace("hedge-v", 1, 3, 5);
    tryPlace("ambulance", 2, 1, 3, "road");
    tryPlace("ambulance", 2, 1, 2, "yard");
    tryPlace("car", 2, 1, 4, "road");
    tryPlace("gurney", 1, 2, 8);
    tryPlace("bench", 2, 1, 7);
    tryPlace("playground", 2, 2, 1);
    tryPlace("blood", 1, 1, 18);
    tryPlace("body-bag", 1, 2, 6);
    tryPlace("lamp", 1, 1, 12);
    tryPlace("trash", 1, 1, 5);
  } else { // military
    tryPlace("sandbag-h", 3, 1, 12);
    tryPlace("sandbag-v", 1, 3, 8);
    tryPlace("mil-truck", 3, 2, 4, "road");
    tryPlace("mil-truck", 3, 2, 2, "yard");
    tryPlace("jeep", 2, 1, 5, "road");
    tryPlace("crate", 1, 1, 24);
    tryPlace("barrels", 1, 1, 14);
    tryPlace("razor-h", 4, 1, 5);
    tryPlace("razor-v", 1, 4, 4);
    tryPlace("blood", 1, 1, 18);
    tryPlace("debris", 1, 1, 18);
    tryPlace("crater", 1, 1, 5);
    tryPlace("flag", 1, 1, 2);
    tryPlace("tree", 1, 1, 8);
  }

  // Spawns
  const spawnRng = mulberry32(meta.id * 31337);
  const findFreeTile = (tries = 100) => {
    for (let i = 0; i < tries; i++) {
      const x = Math.floor(spawnRng() * 48);
      const y = Math.floor(spawnRng() * 48);
      if (occ[y*48+x] === 0) return { x, y };
    }
    return { x: 5, y: 5 };
  };

  const zCount = 3 + meta.difficulty * 2;
  const zombies = [];
  for (let i = 0; i < zCount; i++) zombies.push(findFreeTile());

  const lootCount = 8 + Math.floor(spawnRng() * 4);
  const lootTable = {
    suburb:    ["Bandage","Canned Beans","Pistol Ammo","Bottle Water","Crowbar","Hammer","Jerry Can"],
    downtown:  ["Painkillers","Bread","Apples","Lockpick Set","Holy Water","Newspaper","Shotgun Shells","Factory Keycard"],
    industrial:["Wrench Set","Power Tool","Scrap Metal","Welding Mask","Truck Battery","Generator Parts","Oil Can","Toolbox"],
    hospital:  ["Surgical Kit","Adrenaline Shot","Antibiotics","Morphine","Defibrillator","Stretcher","Snack Bar","Military Access Codes"],
    military:  ["Assault Rifle","Body Armor","Field Radio","MRE Ration","Frag Grenade","Helicopter Keys","Sniper Scope","Night Vision","Tactical Vest"],
  };
  const rarityWeights = { common: 0.5 - meta.difficulty*0.05, uncommon: 0.3, rare: 0.15 + meta.difficulty*0.03, epic: 0.05 + meta.difficulty*0.02 };
  const pickRarity = () => {
    const r = spawnRng();
    let acc = 0;
    for (const [k,v] of Object.entries(rarityWeights)) { acc += v; if (r <= acc) return k; }
    return "common";
  };
  const loot = [];
  for (let i = 0; i < lootCount; i++) {
    const t = findFreeTile();
    const items = lootTable[meta.theme];
    loot.push({ x: t.x, y: t.y, rarity: pickRarity(), item: items[Math.floor(spawnRng() * items.length)] });
  }
  // ensure key items present
  const keyItems = {
    1: null,
    2: { item: "Factory Keycard", rarity: "rare" },
    3: { item: "Generator Parts", rarity: "epic" },
    4: { item: "Military Access Codes", rarity: "rare" },
    5: { item: "Helicopter Keys", rarity: "epic" },
  };
  if (keyItems[meta.id]) {
    const t = findFreeTile();
    loot.push({ x: t.x, y: t.y, rarity: keyItems[meta.id].rarity, item: keyItems[meta.id].item });
  }

  // POIs
  const poiByTheme = {
    suburb:    [{name:"Family Home", emoji:"🏠", desc:"A boarded-up family home. Photo albums on the floor."},
                {name:"Tool Shed",   emoji:"🔧", desc:"A neighbour's locked tool shed. Crowbar inside, dried blood at the door."}],
    downtown:  [{name:"City Hall",   emoji:"🏛️", desc:"Records office. Look for the factory keycard in the basement files."},
                {name:"Gas Station", emoji:"⛽", desc:"Forecourt at the intersection. Pumps dry, cashier counter splashed dark."},
                {name:"Market Square", emoji:"🏪", desc:"Overturned stalls and rotten produce. Survivors left supplies behind."}],
    industrial:[{name:"Factory Floor", emoji:"🏭", desc:"Conveyor belts frozen mid-production. Heavy machinery still hums."},
                {name:"Generator", emoji:"⚙️", desc:"The town generator. Repair it to restore power further east."}],
    hospital:  [{name:"Hospital ICU", emoji:"🏥", desc:"Patient rooms still occupied. Most of them no longer breathing — but moving."},
                {name:"Park Memorial", emoji:"🌳", desc:"A children's playground turned makeshift survivor camp. Long abandoned."}],
    military:  [{name:"Helicopter", emoji:"🚁", desc:"An old utility heli with a half-empty fuel tank. Could it still fly? Endgame objective."},
                {name:"Command Bunker", emoji:"🪖", desc:"The army's last stand. Mission terminals, weapons cache, the truth."}],
  };
  const pois = [];
  const sources = poiByTheme[meta.theme];
  for (let i = 0; i < sources.length; i++) {
    const t = findFreeTile();
    pois.push({ id: "poi_"+meta.id+"_"+i, name: sources[i].name, emoji: sources[i].emoji, desc: sources[i].desc, x: t.x, y: t.y });
  }

  const player_spawn = meta.id === 1 ? { x: 4, y: 32 } : null;

  return { ...meta, buildings, props, zombies, loot, pois, player_spawn };
}

const GATES = [
  { id: "g1_2_a", type: "bridge", connects_segments: [1, 2], between: 1, label: "Old River Bridge" },
  { id: "g2_3_a", type: "breach", connects_segments: [2, 3], between: 2, label: "Wall Breach" },

  { id: "g4_5_a", type: "gate",   connects_segments: [4, 5], between: 4, label: "Checkpoint Alpha" },
];

const RARITY_COLORS = { common:"#aaaaaa", uncommon:"#4ade80", rare:"#60a5fa", epic:"#c026d3" };

const TILESET = [
  { id: 1, name: "grass" }, { id: 2, name: "road" }, { id: 3, name: "sidewalk" },
  { id: 4, name: "building_wall" }, { id: 5, name: "building_floor" }, { id: 6, name: "water" },
  { id: 7, name: "debris" }, { id: 8, name: "gate" }, { id: 9, name: "door" },
];

function generateSegmentTiles(segId) {
  const W=48, H=48;
  const baseByTheme = { 1: 1, 2: 1, 3: 7, 4: 1, 5: 1 };
  const data = new Array(W * H).fill(baseByTheme[segId] || 1);
  // roads
  for (let x = 0; x < W; x++) for (let y = ROAD_H_TOP; y <= ROAD_H_BOT; y++) data[y*W+x] = 2;
  for (let y = 0; y < H; y++) for (let x = ROAD_V_LEFT; x <= ROAD_V_RIGHT; x++) data[y*W+x] = 2;
  // sidewalks
  for (let x = 0; x < W; x++) { data[(ROAD_H_TOP-1)*W+x] = 3; data[(ROAD_H_BOT+1)*W+x] = 3; }
  for (let y = 0; y < H; y++) { data[y*W+(ROAD_V_LEFT-1)] = 3; data[y*W+(ROAD_V_RIGHT+1)] = 3; }
  // buildings
  const seg = SEGMENTS.find(s => s.id === segId);
  for (const b of seg.buildings) {
    for (let dy = 0; dy < b.h; dy++) for (let dx = 0; dx < b.w; dx++) {
      const xx = b.x + dx, yy = b.y + dy;
      if (xx<0||xx>=W||yy<0||yy>=H) continue;
      const onEdge = dx===0 || dy===0 || dx===b.w-1 || dy===b.h-1;
      data[yy*W+xx] = onEdge ? 4 : 5;
    }
    for (const d of (b.doors||[])) if (d.x<W && d.y<H) data[d.y*W+d.x] = 9;
  }
  return data;
}

function buildMapData() {
  const layers = SEGMENTS.map((seg, i) => ({
    id: i + 1,
    name: `segment_${seg.id}_${seg.theme}`,
    type: "tilelayer", width: 48, height: 48, x: i*48, y: 0,
    opacity: 1, visible: true, data: generateSegmentTiles(seg.id),
  }));
  const objects = [];
  let nid = 1;
  for (const seg of SEGMENTS) {
    const ox = (seg.id - 1) * 48 * 32;
    if (seg.player_spawn) objects.push({ id: nid++, name:`player_spawn_seg${seg.id}`, type:"player_spawn", x: ox+seg.player_spawn.x*32, y: seg.player_spawn.y*32, width:32, height:32, properties:[{name:"segment_id",type:"int",value:seg.id}] });
    seg.zombies.forEach((z, i) => objects.push({ id: nid++, name:`zombie_seg${seg.id}_${i}`, type:"zombie_spawn", x: ox+z.x*32, y: z.y*32, width:32, height:32, properties:[{name:"segment_id",type:"int",value:seg.id},{name:"difficulty",type:"int",value:seg.difficulty}] }));
    seg.loot.forEach((l, i) => objects.push({ id: nid++, name:`loot_${l.item.toLowerCase().replace(/\W+/g,"_")}`, type:"loot_spawn", x: ox+l.x*32, y: l.y*32, width:32, height:32, properties:[{name:"segment_id",type:"int",value:seg.id},{name:"rarity",type:"string",value:l.rarity},{name:"item",type:"string",value:l.item}] }));
    seg.pois.forEach(p => objects.push({ id: nid++, name:p.name, type:"poi", x: ox+p.x*32, y: p.y*32, width:32, height:32, properties:[{name:"segment_id",type:"int",value:seg.id},{name:"description",type:"string",value:p.desc},{name:"icon",type:"string",value:p.emoji}] }));
    seg.buildings.forEach(b => objects.push({ id: nid++, name:b.name, type:"building", x: ox+b.x*32, y: b.y*32, width:b.w*32, height:b.h*32, properties:[{name:"segment_id",type:"int",value:seg.id},{name:"building_type",type:"string",value:b.type},{name:"building_id",type:"string",value:b.id}] }));
  }
  for (const g of GATES) {
    const ox = g.between * 48 * 32;
    objects.push({ id: nid++, name: g.label, type:"gate", x: ox-32, y: ROAD_H_TOP*32, width:64, height: (ROAD_H_BOT-ROAD_H_TOP+1)*32, properties:[{name:"gate_id",type:"string",value:g.id},{name:"gate_type",type:"string",value:g.type},{name:"connects_segments",type:"string",value:JSON.stringify(g.connects_segments)}] });
  }
  layers.push({ id:99, name:"objects", type:"objectgroup", visible:true, opacity:1, objects });
  return {
    type:"map", version:"1.10", tiledversion:"1.10.2", orientation:"orthogonal", renderorder:"right-down",
    width:240, height:48, tilewidth:32, tileheight:32, infinite:false, nextlayerid:100, nextobjectid:nid,
    properties:[{name:"segments_meta", type:"string", value: JSON.stringify(SEGMENTS_META)}],
    tilesets:[{firstgid:1, name:"zombiegame2_tiles", tilewidth:32, tileheight:32, tilecount:TILESET.length, columns:TILESET.length, tiles: TILESET.map(t => ({id:t.id-1, properties:[{name:"name",type:"string",value:t.name}]}))}],
    layers,
  };
}

function App() {
  const [hovered, setHovered] = useState(null);
  const [selected, setSelected] = useState(1);
  const [showSpawns, setShowSpawns] = useState(true);
  const [showGates, setShowGates] = useState(true);
  const [showPoiLabels, setShowPoiLabels] = useState(true);
  const [unlockAll, setUnlockAll] = useState(false);
  const [toast, setToast] = useState(null);

  const mapData = useMemo(() => buildMapData(), []);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2200); };

  const copyJson = async () => {
    try {
      const text = JSON.stringify(mapData, null, 2);
      if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(text);
      else { const ta = document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
      showToast(`✓ COPIED ${(text.length/1024).toFixed(1)} KB OF TILED JSON`);
    } catch(e){ showToast("✗ COPY FAILED"); }
  };

  // ============ FULL MAP LAYOUT ============
  // Render all 5 segments as a horizontal strip, full-bleed.
  // Each segment 48 tiles wide. tile size = ~5 px → 240 tiles * 5 = 1200 px wide.
  // We'll render at 1840px wide → ~7.6 px/tile.
  const TILE = 7.6;
  const SEG_W = 48 * TILE;       // 364.8
  const SEG_H = 48 * TILE;       // 364.8
  const PAD_X = 12;
  const PAD_TOP = 28;
  const PAD_BOT = 22;
  const VB_W = PAD_X * 2 + 5 * SEG_W;  // ~1848
  const VB_H = PAD_TOP + SEG_H + PAD_BOT;

  const segOffsetX = (i) => PAD_X + i * SEG_W;
  const segIsLocked = (seg) => !unlockAll && seg.status === "locked";
  const sel = SEGMENTS.find(s => s.id === selected);

  // Render a building with realistic top-down look: pitched roof for gables,
  // saw-tooth for factories, etc. Buildings sit ON ground tiles, NOT on roads.
  const renderBuilding = (segIdx, b) => {
    const x = segOffsetX(segIdx) + b.x * TILE;
    const y = PAD_TOP + b.y * TILE;
    const w = b.w * TILE, h = b.h * TILE;
    const s = BUILDING_STYLE[b.type] || BUILDING_STYLE.house;
    const roofKind = b.roof || "flat";

    const elements = [];

    // shadow
    elements.push(<rect key="sh" x={x+2} y={y+2} width={w} height={h} fill="#000" fillOpacity="0.55" />);

    // base footprint (walls visible at perimeter) with pixel-art highlight on top/left
    elements.push(<rect key="wall" x={x} y={y} width={w} height={h} fill={s.wall} stroke="#000" strokeWidth="0.6" />);
    // 1px highlight strip on top + left
    elements.push(<rect key="whlt" x={x+0.5} y={y+0.5} width={w-1} height={1.2} fill="#fff" fillOpacity="0.18" />);
    elements.push(<rect key="whll" x={x+0.5} y={y+0.5} width={1.2} height={h-1} fill="#fff" fillOpacity="0.18" />);
    // 1px shadow strip on bottom + right
    elements.push(<rect key="wshb" x={x+0.5} y={y+h-1.7} width={w-1} height={1.2} fill="#000" fillOpacity="0.25" />);
    elements.push(<rect key="wshr" x={x+w-1.7} y={y+0.5} width={1.2} height={h-1} fill="#000" fillOpacity="0.25" />);

    if (roofKind === "gable") {
      // pitched roof — chunky pixel-art tile rows
      const horiz = w >= h;
      const eaves = TILE * 0.7;
      const tileRowPx = 2.4;  // chunky row height
      if (horiz) {
        // light upper slope
        elements.push(<polygon key="r1" points={`${x-1},${y-1} ${x+w+1},${y-1} ${x+w-eaves},${y+h/2} ${x+eaves},${y+h/2}`} fill={s.roof} />);
        // dark lower slope
        elements.push(<polygon key="r2" points={`${x+eaves},${y+h/2} ${x+w-eaves},${y+h/2} ${x+w+1},${y+h+1} ${x-1},${y+h+1}`} fill={s.roofDk} />);
        // CHUNKY TILE ROWS — alternating light/dark stripes on each slope
        for (let yy = y; yy < y + h/2; yy += tileRowPx) {
          const t = (yy - y) / (h/2);  // 0..1
          const inset = eaves * t;
          elements.push(<rect key={"tu"+yy} x={x+inset} y={yy} width={w - 2*inset} height={1} fill={s.roofDk} fillOpacity="0.55" />);
        }
        for (let yy = y + h/2 + tileRowPx*0.5; yy < y + h; yy += tileRowPx) {
          const t = (yy - (y+h/2)) / (h/2);
          const inset = eaves * (1 - t);
          elements.push(<rect key={"td"+yy} x={x+inset} y={yy} width={w - 2*inset} height={1} fill="#000" fillOpacity="0.4" />);
        }
        // ridge cap (bright)
        elements.push(<rect key="rdg" x={x+eaves} y={y+h/2-0.8} width={w-2*eaves} height={1.6} fill="#fff" fillOpacity="0.18" />);
        elements.push(<rect key="rdgd" x={x+eaves} y={y+h/2+0.5} width={w-2*eaves} height={0.8} fill="#000" fillOpacity="0.4" />);
        // gable end shadow triangles (left + right)
        elements.push(<polygon key="ge1" points={`${x-1},${y-1} ${x+eaves},${y+h/2} ${x-1},${y+h+1}`} fill="#000" fillOpacity="0.25" />);
        elements.push(<polygon key="ge2" points={`${x+w+1},${y-1} ${x+w-eaves},${y+h/2} ${x+w+1},${y+h+1}`} fill="#000" fillOpacity="0.25" />);
        // CHIMNEY: brick block with dark cap, drop shadow
        const chx = x + w*0.28, chy = y + h*0.18;
        elements.push(<rect key="chs" x={chx+1} y={chy+1} width={TILE*0.8} height={TILE*1.1} fill="#000" fillOpacity="0.55" />);
        elements.push(<rect key="ch" x={chx} y={chy} width={TILE*0.8} height={TILE*1.1} fill="#5a3520" stroke="#000" strokeWidth="0.5" />);
        elements.push(<rect key="chc" x={chx-0.4} y={chy} width={TILE*0.8 + 0.8} height={TILE*0.25} fill="#3a2010" stroke="#000" strokeWidth="0.3" />);
        elements.push(<rect key="chh" x={chx+0.4} y={chy+TILE*0.3} width={TILE*0.6} height={0.8} fill="#fff" fillOpacity="0.2" />);
      } else {
        // ridge runs vertically
        elements.push(<polygon key="r1" points={`${x-1},${y-1} ${x+w/2},${y+eaves} ${x+w/2},${y+h-eaves} ${x-1},${y+h+1}`} fill={s.roof} />);
        elements.push(<polygon key="r2" points={`${x+w/2},${y+eaves} ${x+w+1},${y-1} ${x+w+1},${y+h+1} ${x+w/2},${y+h-eaves}`} fill={s.roofDk} />);
        for (let xx = x; xx < x + w/2; xx += tileRowPx) {
          const t = (xx - x) / (w/2);
          const inset = eaves * t;
          elements.push(<rect key={"tu"+xx} x={xx} y={y+inset} width={1} height={h - 2*inset} fill={s.roofDk} fillOpacity="0.55" />);
        }
        for (let xx = x + w/2 + tileRowPx*0.5; xx < x + w; xx += tileRowPx) {
          const t = (xx - (x+w/2)) / (w/2);
          const inset = eaves * (1 - t);
          elements.push(<rect key={"td"+xx} x={xx} y={y+inset} width={1} height={h - 2*inset} fill="#000" fillOpacity="0.4" />);
        }
        elements.push(<rect key="rdg" x={x+w/2-0.8} y={y+eaves} width={1.6} height={h-2*eaves} fill="#fff" fillOpacity="0.18" />);
        // chimney
        const chx = x + w*0.18, chy = y + h*0.4;
        elements.push(<rect key="chs" x={chx+1} y={chy+1} width={TILE*1.1} height={TILE*0.8} fill="#000" fillOpacity="0.55" />);
        elements.push(<rect key="ch" x={chx} y={chy} width={TILE*1.1} height={TILE*0.8} fill="#5a3520" stroke="#000" strokeWidth="0.5" />);
        elements.push(<rect key="chc" x={chx} y={chy-0.4} width={TILE*1.1} height={TILE*0.25} fill="#3a2010" stroke="#000" strokeWidth="0.3" />);
      }
    } else if (roofKind === "flat") {
      // flat roof: solid color with slight inset border + AC unit / vent
      elements.push(<rect key="rf" x={x+1} y={y+1} width={w-2} height={h-2} fill={s.roof} />);
      // tar-paper grid pattern (chunky pixel-art rectangles)
      const gridStep = TILE * 1.5;
      for (let gx = x + gridStep; gx < x + w - 1; gx += gridStep) {
        elements.push(<line key={"gv"+gx} x1={gx} y1={y+2} x2={gx} y2={y+h-2} stroke={s.roofDk} strokeOpacity="0.5" strokeWidth="0.4" />);
      }
      for (let gy = y + gridStep; gy < y + h - 1; gy += gridStep) {
        elements.push(<line key={"gh"+gy} x1={x+2} y1={gy} x2={x+w-2} y2={gy} stroke={s.roofDk} strokeOpacity="0.5" strokeWidth="0.4" />);
      }
      // top-left highlight pixel band (pixel-art style)
      elements.push(<rect key="rfh" x={x+1} y={y+1} width={w-2} height={1.2} fill="#fff" fillOpacity="0.2" />);
      elements.push(<rect key="rfh2" x={x+1} y={y+1} width={1.2} height={h-2} fill="#fff" fillOpacity="0.2" />);
      // bottom-right shadow band
      elements.push(<rect key="rfsh" x={x+1} y={y+h-2.2} width={w-2} height={1.2} fill="#000" fillOpacity="0.3" />);
      elements.push(<rect key="rfsh2" x={x+w-2.2} y={y+1} width={1.2} height={h-2} fill="#000" fillOpacity="0.3" />);
      elements.push(<rect key="rfb" x={x+1} y={y+1} width={w-2} height={h-2} fill="none" stroke={s.roofDk} strokeWidth="0.5" />);
      // parapet wall (small dark rim, suggests building edge)
      elements.push(<rect key="rfp" x={x+0.5} y={y+0.5} width={w-1} height={h-1} fill="none" stroke={s.trim} strokeWidth="0.6" />);
      // AC unit
      if (w > TILE*4 && h > TILE*4) {
        elements.push(<rect key="ac" x={x + w*0.15} y={y + h*0.15} width={TILE*1.4} height={TILE*0.9} fill={s.trim} stroke="#000" strokeWidth="0.3" />);
        elements.push(<rect key="acg" x={x + w*0.18} y={y + h*0.18} width={TILE*1.1} height={TILE*0.3} fill="#1a1a1a" />);
        elements.push(<rect key="ac2" x={x + w*0.7} y={y + h*0.6} width={TILE*1.2} height={TILE*0.8} fill={s.trim} stroke="#000" strokeWidth="0.3" />);
      }
    } else if (roofKind === "apt") {
      // apartment block: flat roof with regular window/balcony grid visible from above
      elements.push(<rect key="rf" x={x+1} y={y+1} width={w-2} height={h-2} fill={s.roof} />);
      elements.push(<rect key="rfb" x={x+1} y={y+1} width={w-2} height={h-2} fill="none" stroke={s.roofDk} strokeWidth="0.5" />);
      // top-left highlight band
      elements.push(<rect key="rfh" x={x+1} y={y+1} width={w-2} height={1.2} fill="#fff" fillOpacity="0.18" />);
      elements.push(<rect key="rfh2" x={x+1} y={y+1} width={1.2} height={h-2} fill="#fff" fillOpacity="0.18" />);
      // balcony grid: rows of small balconies
      const cols = Math.max(2, Math.floor(w / (TILE*1.6)));
      const rows = Math.max(2, Math.floor(h / (TILE*1.8)));
      const bcW = (w - 4) / cols;
      const bcH = (h - 4) / rows;
      for (let cc = 0; cc < cols; cc++) {
        for (let rr = 0; rr < rows; rr++) {
          const bx = x + 2 + cc*bcW + bcW*0.18;
          const by = y + 2 + rr*bcH + bcH*0.2;
          const bw = bcW*0.64, bh = bcH*0.6;
          elements.push(<rect key={"bc"+cc+"_"+rr} x={bx} y={by} width={bw} height={bh} fill="#1a1410" stroke="#000" strokeWidth="0.3" />);
          elements.push(<rect key={"bc2"+cc+"_"+rr} x={bx+0.6} y={by+0.6} width={bw-1.2} height={bh*0.5} fill="#3a3025" />);
        }
      }
      // central elevator shaft / stairwell box
      elements.push(<rect key="es" x={x + w*0.4} y={y + h*0.4} width={w*0.2} height={h*0.2} fill={s.trim} stroke="#000" strokeWidth="0.4" />);
    } else if (roofKind === "saw") {
      // saw-tooth factory roof: alternating dark/light strips
      const stripes = Math.max(2, Math.floor(w / (TILE*3)));
      const sw = (w-2) / stripes;
      for (let k = 0; k < stripes; k++) {
        elements.push(<rect key={"sw"+k} x={x+1+k*sw} y={y+1} width={sw} height={h-2} fill={k % 2 === 0 ? s.roof : s.roofDk} />);
        // skylight
        elements.push(<rect key={"sk"+k} x={x+1+k*sw + sw*0.3} y={y+2} width={sw*0.4} height={h-4} fill="#9cc8d8" fillOpacity="0.4" />);
      }
      // chimney stacks
      const stacks = Math.max(1, Math.floor(w / (TILE*8)));
      for (let k = 0; k < stacks; k++) {
        elements.push(<rect key={"st"+k} x={x + (k+0.5)*(w/stacks) - TILE*0.4} y={y - TILE*0.6} width={TILE*0.8} height={TILE*1.2} fill="#1a1410" stroke="#000" strokeWidth="0.4" />);
      }
    } else if (roofKind === "round") {
      elements.push(<ellipse key="r" cx={x+w/2} cy={y+h/2} rx={w/2-1} ry={h/2-1} fill={s.roof} stroke={s.roofDk} strokeWidth="0.6" />);
      elements.push(<ellipse key="r2" cx={x+w/2} cy={y+h/2} rx={(w/2-1)*0.6} ry={(h/2-1)*0.6} fill={s.roofDk} fillOpacity="0.4" />);
    } else if (roofKind === "tent") {
      // pyramid tent
      elements.push(<polygon key="t1" points={`${x},${y+h} ${x+w/2},${y} ${x+w/2},${y+h}`} fill={s.roof} stroke={s.roofDk} strokeWidth="0.5" />);
      elements.push(<polygon key="t2" points={`${x+w/2},${y} ${x+w},${y+h} ${x+w/2},${y+h}`} fill={s.roofDk} stroke={s.roofDk} strokeWidth="0.5" />);
    } else if (roofKind === "pad") {
      // helipad: concrete with H mark
      elements.push(<rect key="rf" x={x+1} y={y+1} width={w-2} height={h-2} fill="#3a3a3a" />);
      elements.push(<circle key="cr" cx={x+w/2} cy={y+h/2} r={Math.min(w,h)*0.32} fill="none" stroke="#ffd93d" strokeWidth="2" />);
      elements.push(<text key="h" x={x+w/2} y={y+h/2 + h*0.14} textAnchor="middle" fontFamily="Courier New" fontWeight="bold" fontSize={Math.min(w,h)*0.35} fill="#ffd93d">H</text>);
    }

    // Type-specific roof extras
    if (b.type === "church") {
      // bell tower at front
      const tx = x + w/2 - TILE*0.7;
      const ty = y - TILE*1.5;
      elements.push(<rect key="bt" x={tx} y={ty} width={TILE*1.4} height={TILE*1.5} fill={s.wall} stroke="#000" strokeWidth="0.4" />);
      elements.push(<polygon key="bts" points={`${tx-1},${ty} ${tx+TILE*1.4+1},${ty} ${tx+TILE*0.7},${ty-TILE*0.9}`} fill={s.roof} stroke={s.roofDk} strokeWidth="0.4" />);
      elements.push(<rect key="cross-v" x={tx + TILE*0.65} y={ty - TILE*1.3} width={1.2} height={TILE*0.6} fill="#ffd93d" />);
      elements.push(<rect key="cross-h" x={tx + TILE*0.45} y={ty - TILE*1.0} width={TILE*0.6} height={1.2} fill="#ffd93d" />);
    }
    if (b.type === "hospital") {
      elements.push(<rect key="hxv" x={x+w/2-TILE*0.4} y={y+h/2-TILE*1.2} width={TILE*0.8} height={TILE*2.4} fill="#8b1a1a" />);
      elements.push(<rect key="hxh" x={x+w/2-TILE*1.2} y={y+h/2-TILE*0.4} width={TILE*2.4} height={TILE*0.8} fill="#8b1a1a" />);
    }
    if (b.type === "gas") {
      // store building gets red roof stripe + canopy/pumps drawn separately
      elements.push(<rect key="gc" x={x} y={y} width={w} height={TILE*0.7} fill="#c44a2a" />);
      elements.push(<rect key="gcs" x={x} y={y+TILE*0.5} width={w} height={1} fill="#7a2a18" />);
      // store sign
      elements.push(<rect key="gsig" x={x+w*0.25} y={y+h*0.45} width={w*0.5} height={TILE*0.7} fill="#ffd93d" stroke="#000" strokeWidth="0.5" />);
      elements.push(<text key="gsigt" x={x+w/2} y={y+h*0.45+TILE*0.55} textAnchor="middle" fontSize={TILE*0.6} fontFamily="Courier New" fontWeight="bold" fill="#000">SHOP</text>);
      // canopy + pumps drawn south of the store, sized to fit between building and road
      const roadTopPx = PAD_TOP + (ROAD_H_TOP - 1) * TILE; // sidewalk row begins here
      const gap = TILE * 0.4;
      const cy = y + h + gap;
      const cx = x;
      const cw = w * 1.0;
      // available vertical space, capped at 3.4 tiles
      const maxCh = Math.max(TILE * 1.6, roadTopPx - cy - 2);
      const ch = Math.min(TILE * 3.4, maxCh);
      // canopy shadow
      elements.push(<rect key="cnsh" x={cx+1.5} y={cy+1.5} width={cw} height={ch} fill="#000" fillOpacity="0.5" />);
      // canopy roof
      elements.push(<rect key="cn" x={cx} y={cy} width={cw} height={ch} fill="#e8e8d8" stroke="#000" strokeWidth="0.6" />);
      elements.push(<rect key="cnstripe" x={cx} y={cy} width={cw} height={TILE*0.5} fill="#c44a2a" />);
      // canopy posts (4 corners)
      elements.push(<rect key="p1" x={cx+TILE*0.3} y={cy+TILE*0.6} width={TILE*0.4} height={TILE*0.4} fill="#3a3a3a" />);
      elements.push(<rect key="p2" x={cx+cw-TILE*0.7} y={cy+TILE*0.6} width={TILE*0.4} height={TILE*0.4} fill="#3a3a3a" />);
      elements.push(<rect key="p3" x={cx+TILE*0.3} y={cy+ch-TILE*1.0} width={TILE*0.4} height={TILE*0.4} fill="#3a3a3a" />);
      elements.push(<rect key="p4" x={cx+cw-TILE*0.7} y={cy+ch-TILE*1.0} width={TILE*0.4} height={TILE*0.4} fill="#3a3a3a" />);
      // 2 pumps
      const pumpY = cy + ch*0.45;
      const pump1X = cx + cw*0.3 - TILE*0.4;
      const pump2X = cx + cw*0.7 - TILE*0.4;
      [pump1X, pump2X].forEach((px, idx) => {
        elements.push(<rect key={"pm"+idx} x={px} y={pumpY} width={TILE*0.8} height={TILE*1.2} fill="#c44a2a" stroke="#000" strokeWidth="0.4" />);
        elements.push(<rect key={"pms"+idx} x={px+TILE*0.15} y={pumpY+TILE*0.2} width={TILE*0.5} height={TILE*0.4} fill="#1a1a1a" />);
        elements.push(<rect key={"pmh"+idx} x={px+TILE*0.7} y={pumpY+TILE*0.55} width={TILE*0.15} height={TILE*0.5} fill="#3a3a3a" />);
      });
      // forecourt apron paint marks
      elements.push(<line key="ap" x1={cx+TILE*0.2} y1={cy+ch+0.5} x2={cx+cw-TILE*0.2} y2={cy+ch+0.5} stroke="#fff" strokeOpacity="0.5" strokeWidth="0.6" strokeDasharray="3,2" />);
    }
    if (b.type === "civic") {
      // columns at front
      for (let k = 0; k < 5; k++) {
        elements.push(<rect key={"col"+k} x={x+(k+1)*(w/6)-TILE*0.2} y={y+h-TILE*0.5} width={TILE*0.4} height={TILE*0.5} fill={s.trim} />);
      }
    }
    if (b.type === "bank") {
      elements.push(<text key="bk" x={x+w/2} y={y+h/2+5} textAnchor="middle" fontFamily="Courier New" fontWeight="bold" fontSize={Math.min(w,h)*0.35} fill="#ffd93d">$</text>);
    }
    if (b.type === "tank") {
      elements.push(<text key="tk" x={x+w/2} y={y+h/2+3} textAnchor="middle" fontSize={Math.min(w,h)*0.3} fill="#ffd93d">⛽</text>);
    }
    if (b.type === "tower") {
      // small square in middle
      elements.push(<rect key="tw" x={x+w*0.3} y={y+h*0.3} width={w*0.4} height={h*0.4} fill={s.trim} stroke="#000" strokeWidth="0.4" />);
    }

    // doors
    for (const d of (b.doors || [])) {
      const dx = segOffsetX(segIdx) + d.x * TILE;
      const dy = PAD_TOP + d.y * TILE;
      elements.push(<rect key={"dr"+d.x+d.y} x={dx + TILE*0.15} y={dy + TILE*0.05} width={TILE*0.7} height={TILE*0.9} fill={s.trim} stroke="#000" strokeWidth="0.3" />);
    }

    return <g key={b.id}>{elements}</g>;
  };

  const renderProp = (segIdx, p, idx) => {
    const x = segOffsetX(segIdx) + p.x * TILE;
    const y = PAD_TOP + p.y * TILE;
    const cx = x + TILE/2, cy = y + TILE/2;
    const T = TILE;
    const k = "p"+segIdx+"_"+idx;
    switch(p.kind) {
      case "tree": return <g key={k} pointerEvents="none">
        <circle cx={cx+0.6} cy={cy+0.6} r={T*0.7} fill="#000" fillOpacity="0.45" />
        <circle cx={cx} cy={cy} r={T*0.7} fill="#1f3810" />
        <circle cx={cx-T*0.1} cy={cy-T*0.1} r={T*0.5} fill="#3e7020" />
        <circle cx={cx-T*0.2} cy={cy-T*0.2} r={T*0.18} fill="#5a8030" />
      </g>;
      case "bush": return <g key={k} pointerEvents="none">
        <circle cx={cx} cy={cy} r={T*0.4} fill="#1f3810" />
        <circle cx={cx-T*0.1} cy={cy-T*0.1} r={T*0.25} fill="#3e7020" />
      </g>;
      case "hedge-h": return <g key={k} pointerEvents="none">
        <rect x={x} y={y+T*0.2} width={T*2.9} height={T*0.6} fill="#1f3810" stroke="#10200a" strokeWidth="0.3" />
        <rect x={x+1} y={y+T*0.25} width={T*2.9-2} height={T*0.25} fill="#3e7020" />
      </g>;
      case "hedge-v": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.2} y={y} width={T*0.6} height={T*2.9} fill="#1f3810" stroke="#10200a" strokeWidth="0.3" />
        <rect x={x+T*0.25} y={y+1} width={T*0.25} height={T*2.9-2} fill="#3e7020" />
      </g>;
      case "car": {
        const palette = ["#8b1a1a","#1e4d6b","#5a5a5a","#2a4a2a","#7a5a30","#ddd"];
        const col = palette[(p.x*7+p.y)%palette.length];
        return <g key={k} pointerEvents="none">
          <rect x={x+1} y={y+T*0.15} width={T*1.9} height={T*0.7} fill="#000" fillOpacity="0.45" />
          <rect x={x} y={y+T*0.1} width={T*1.9} height={T*0.7} fill={col} stroke="#000" strokeWidth="0.4" />
          <rect x={x+T*0.15} y={y+T*0.18} width={T*0.5} height={T*0.55} fill="#9cd8e8" />
          <rect x={x+T*1.25} y={y+T*0.18} width={T*0.5} height={T*0.55} fill="#9cd8e8" />
          <rect x={x+T*0.78} y={y+T*0.1} width={T*0.34} height={T*0.7} fill={col} />
          <rect x={x+T*0.05} y={y+T*0.05} width={T*0.1} height={T*0.1} fill="#fff" />
          <rect x={x+T*1.75} y={y+T*0.05} width={T*0.1} height={T*0.1} fill="#fff" />
        </g>;
      }
      case "wreck": return <g key={k} pointerEvents="none">
        <rect x={x+1} y={y+T*0.15} width={T*1.9} height={T*0.7} fill="#000" fillOpacity="0.55" />
        <rect x={x} y={y+T*0.1} width={T*1.9} height={T*0.7} fill="#3a3a3a" stroke="#000" strokeWidth="0.4" />
        <rect x={x+T*0.2} y={y+T*0.18} width={T*0.5} height={T*0.55} fill="#1a1a1a" />
        <polygon points={`${x+T*0.9},${y+T*0.05} ${x+T*1.3},${y+T*0.45} ${x+T*0.95},${y+T*0.4}`} fill="#c44a2a" />
        <rect x={x+T*0.4} y={y+T*0.05} width={T*0.2} height={T*0.15} fill="#888" opacity="0.7" />
      </g>;
      case "bus": return <g key={k} pointerEvents="none">
        <rect x={x+1} y={y+T*0.1} width={T*2.9} height={T*0.8} fill="#000" fillOpacity="0.5" />
        <rect x={x} y={y+T*0.05} width={T*2.9} height={T*0.85} fill="#ffd93d" stroke="#000" strokeWidth="0.4" />
        {[0.2,0.85,1.5,2.15].map((dx,i) => <rect key={i} x={x+T*dx} y={y+T*0.15} width={T*0.5} height={T*0.6} fill="#9cd8e8"/>)}
        <rect x={x+T*2.7} y={y+T*0.15} width={T*0.18} height={T*0.6} fill="#1a1a1a" />
      </g>;
      case "truck": return <g key={k} pointerEvents="none">
        <rect x={x+1} y={y+1} width={T*2.9} height={T*1.9} fill="#000" fillOpacity="0.5" />
        <rect x={x} y={y} width={T*0.9} height={T*1.9} fill="#5a5a5a" stroke="#000" strokeWidth="0.4" />
        <rect x={x+T*0.9} y={y} width={T*2} height={T*1.9} fill="#7a4a2a" stroke="#000" strokeWidth="0.4" />
        <rect x={x+T*0.15} y={y+T*0.2} width={T*0.6} height={T*0.5} fill="#9cd8e8" />
        <rect x={x+T*1.0} y={y+T*0.1} width={T*1.8} height={T*0.15} fill="#5a3520" />
      </g>;
      case "ambulance": return <g key={k} pointerEvents="none">
        <rect x={x+1} y={y+T*0.05} width={T*1.9} height={T*0.85} fill="#000" fillOpacity="0.5" />
        <rect x={x} y={y} width={T*1.9} height={T*0.9} fill="#e8eef4" stroke="#1e4d6b" strokeWidth="0.5" />
        <rect x={x+T*0.6} y={y+T*0.3} width={T*0.18} height={T*0.4} fill="#8b1a1a" />
        <rect x={x+T*0.5} y={y+T*0.4} width={T*0.4} height={T*0.18} fill="#8b1a1a" />
        <rect x={x+T*1.5} y={y} width={T*0.3} height={T*0.15} fill="#1e4d6b" />
        <rect x={x+T*0.15} y={y+T*0.2} width={T*0.3} height={T*0.5} fill="#9cd8e8" />
      </g>;
      case "mil-truck": return <g key={k} pointerEvents="none">
        <rect x={x+1} y={y+1} width={T*2.9} height={T*1.9} fill="#000" fillOpacity="0.5" />
        <rect x={x} y={y} width={T*0.9} height={T*1.9} fill="#3a4022" stroke="#000" strokeWidth="0.4" />
        <rect x={x+T*0.9} y={y} width={T*2} height={T*1.9} fill="#5a6b2a" stroke="#000" strokeWidth="0.4" />
        <line x1={x+T*0.95} y1={y+T*0.5} x2={x+T*2.85} y2={y+T*0.5} stroke="#3a4022" strokeWidth="0.5" />
        <line x1={x+T*0.95} y1={y+T*1.4} x2={x+T*2.85} y2={y+T*1.4} stroke="#3a4022" strokeWidth="0.5" />
        <rect x={x+T*0.15} y={y+T*0.5} width={T*0.4} height={T*0.5} fill="#1a1a10" />
      </g>;
      case "jeep": return <g key={k} pointerEvents="none">
        <rect x={x+1} y={y+T*0.1} width={T*1.9} height={T*0.8} fill="#000" fillOpacity="0.5" />
        <rect x={x} y={y+T*0.05} width={T*1.9} height={T*0.85} fill="#3a4022" stroke="#000" strokeWidth="0.4" />
        <rect x={x+T*0.15} y={y+T*0.2} width={T*0.5} height={T*0.55} fill="#5a6b2a" />
        <rect x={x+T*1.25} y={y+T*0.2} width={T*0.5} height={T*0.55} fill="#5a6b2a" />
      </g>;
      case "container": {
        const palette = ["#7a4a2a","#3a3a5a","#5a3a3a","#3a5a3a","#5a4a2a"];
        const col = palette[(p.x+p.y)%palette.length];
        const w = T*2.9, h = T*1.9;
        return <g key={k} pointerEvents="none">
          <rect x={x+1} y={y+1} width={w} height={h} fill="#000" fillOpacity="0.5" />
          <rect x={x} y={y} width={w} height={h} fill={col} stroke="#000" strokeWidth="0.5" />
          {Array.from({length:6}).map((_,i) => <line key={i} x1={x+(i+1)*(w/7)} y1={y} x2={x+(i+1)*(w/7)} y2={y+h} stroke="#000" strokeOpacity="0.4" strokeWidth="0.3" />)}
        </g>;
      }
      case "barrels": return <g key={k} pointerEvents="none">
        <circle cx={cx+0.5} cy={cy+0.5} r={T*0.32} fill="#000" fillOpacity="0.45" />
        <circle cx={cx} cy={cy} r={T*0.32} fill="#7a3a1a" stroke="#3a1a08" strokeWidth="0.4" />
        <circle cx={cx} cy={cy} r={T*0.18} fill="#5a2a10" />
      </g>;
      case "crate": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.15+0.5} y={y+T*0.15+0.5} width={T*0.7} height={T*0.7} fill="#000" fillOpacity="0.4" />
        <rect x={x+T*0.15} y={y+T*0.15} width={T*0.7} height={T*0.7} fill="#7a5a30" stroke="#3a2818" strokeWidth="0.4" />
        <line x1={x+T*0.15} y1={y+T*0.5} x2={x+T*0.85} y2={y+T*0.5} stroke="#3a2818" strokeWidth="0.3" />
        <line x1={x+T*0.5} y1={y+T*0.15} x2={x+T*0.5} y2={y+T*0.85} stroke="#3a2818" strokeWidth="0.3" />
      </g>;
      case "pallet": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.1} y={y+T*0.25} width={T*0.8} height={T*0.5} fill="#a87b4a" stroke="#5a3520" strokeWidth="0.3" />
        <line x1={x+T*0.1} y1={y+T*0.4} x2={x+T*0.9} y2={y+T*0.4} stroke="#5a3520" strokeWidth="0.3" />
        <line x1={x+T*0.1} y1={y+T*0.6} x2={x+T*0.9} y2={y+T*0.6} stroke="#5a3520" strokeWidth="0.3" />
      </g>;
      case "dumpster": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.05+0.5} y={y+T*0.15+0.5} width={T*0.9} height={T*0.7} fill="#000" fillOpacity="0.45" />
        <rect x={x+T*0.05} y={y+T*0.15} width={T*0.9} height={T*0.7} fill="#3a5a3a" stroke="#1a2a1a" strokeWidth="0.4" />
        <line x1={x+T*0.5} y1={y+T*0.15} x2={x+T*0.5} y2={y+T*0.85} stroke="#1a2a1a" strokeWidth="0.3" />
      </g>;
      case "trash": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.25} y={y+T*0.3} width={T*0.5} height={T*0.5} fill="#444433" stroke="#222216" strokeWidth="0.3" />
      </g>;
      case "debris": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.15} y={y+T*0.4} width={T*0.3} height={T*0.2} fill="#5a5a48" />
        <rect x={x+T*0.55} y={y+T*0.5} width={T*0.25} height={T*0.18} fill="#444433" />
        <rect x={x+T*0.4} y={y+T*0.2} width={T*0.18} height={T*0.18} fill="#666655" />
      </g>;
      case "blood": return <g key={k} pointerEvents="none" opacity="0.8">
        <circle cx={cx} cy={cy} r={T*0.4} fill="#5a0a0a" />
        <circle cx={cx-T*0.15} cy={cy-T*0.1} r={T*0.2} fill="#8b1a1a" />
        <circle cx={cx+T*0.2} cy={cy+T*0.18} r={T*0.13} fill="#5a0a0a" />
      </g>;
      case "lamp": return <g key={k} pointerEvents="none">
        <rect x={cx-1} y={y+T*0.1} width={2} height={T*0.8} fill="#3a3a3a" />
        <circle cx={cx} cy={y+T*0.15} r={T*0.18} fill="#ffd93d" />
        <circle cx={cx} cy={y+T*0.15} r={T*0.32} fill="#ffd93d" fillOpacity="0.15" />
      </g>;
      case "bench": return <g key={k} pointerEvents="none">
        <rect x={x} y={y+T*0.35} width={T*1.9} height={T*0.3} fill="#7a5a30" stroke="#3a2818" strokeWidth="0.3" />
      </g>;
      case "mailbox": return <g key={k} pointerEvents="none">
        <rect x={cx-1} y={y+T*0.4} width={2} height={T*0.6} fill="#3a3a3a" />
        <rect x={x+T*0.2} y={y+T*0.2} width={T*0.6} height={T*0.3} fill="#3a4a8a" stroke="#1a2a4a" strokeWidth="0.3" />
      </g>;
      case "sign": return <g key={k} pointerEvents="none">
        <rect x={cx-1} y={y+T*0.5} width={2} height={T*0.5} fill="#3a3a3a" />
        <rect x={x+T*0.2} y={y+T*0.1} width={T*0.6} height={T*0.4} fill="#ffd93d" stroke="#000" strokeWidth="0.3" />
      </g>;
      case "planter": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.15} y={y+T*0.15} width={T*0.7} height={T*0.7} fill="#7a5a30" stroke="#3a2818" strokeWidth="0.4" />
        <circle cx={cx} cy={cy} r={T*0.25} fill="#3e7020" />
      </g>;
      case "oil": return <g key={k} pointerEvents="none" opacity="0.85">
        <ellipse cx={cx} cy={cy} rx={T*0.45} ry={T*0.32} fill="#0a0a0a" />
        <ellipse cx={cx-T*0.1} cy={cy-T*0.05} rx={T*0.2} ry={T*0.13} fill="#1a1a1a" />
      </g>;
      case "crane": return <g key={k} pointerEvents="none">
        <rect x={x} y={y} width={T*2} height={T*2} fill="#3a3a3a" stroke="#000" strokeWidth="0.4" />
        <rect x={x+T*0.2} y={y+T*0.2} width={T*1.6} height={T*0.4} fill="#ffd93d" />
        <rect x={x+T*0.9} y={y+T*0.6} width={T*0.2} height={T*1.4} fill="#3a3a3a" />
      </g>;
      case "forklift": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.1} y={y+T*0.2} width={T*1.4} height={T*0.6} fill="#ffd93d" stroke="#000" strokeWidth="0.4" />
        <rect x={x+T*1.5} y={y+T*0.3} width={T*0.4} height={T*0.4} fill="#666" />
      </g>;
      case "gurney": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.25} y={y} width={T*0.5} height={T*1.9} fill="#bdc8d4" stroke="#5a6878" strokeWidth="0.4" />
        <rect x={x+T*0.25} y={y+T*0.6} width={T*0.5} height={T*0.4} fill="#8b1a1a" opacity="0.7" />
      </g>;
      case "body-bag": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.2} y={y} width={T*0.6} height={T*1.9} fill="#1a1a1a" stroke="#000" strokeWidth="0.4" />
        <line x1={x+T*0.5} y1={y+T*0.2} x2={x+T*0.5} y2={y+T*1.7} stroke="#3a3a3a" strokeWidth="0.3" />
      </g>;
      case "playground": return <g key={k} pointerEvents="none">
        <rect x={x} y={y} width={T*2} height={T*2} fill="#5a8030" />
        <rect x={x+T*0.4} y={y+T*0.4} width={T*1.2} height={T*0.2} fill="#c44a2a" />
        <rect x={x+T*0.5} y={y+T*0.6} width={1} height={T*1.2} fill="#3a3a3a" />
        <rect x={x+T*1.5} y={y+T*0.6} width={1} height={T*1.2} fill="#3a3a3a" />
        <circle cx={x+T} cy={y+T*1.4} r={T*0.25} fill="#ffd93d" />
      </g>;
      case "sandbag-h": return <g key={k} pointerEvents="none">
        <rect x={x} y={y+T*0.2} width={T*2.9} height={T*0.6} fill="#7a6a3a" stroke="#3a2818" strokeWidth="0.4" />
        {[0.5,1.0,1.5,2.0,2.5].map((dx,i)=> <line key={i} x1={x+T*dx} y1={y+T*0.2} x2={x+T*dx} y2={y+T*0.8} stroke="#3a2818" strokeWidth="0.3" />)}
      </g>;
      case "sandbag-v": return <g key={k} pointerEvents="none">
        <rect x={x+T*0.2} y={y} width={T*0.6} height={T*2.9} fill="#7a6a3a" stroke="#3a2818" strokeWidth="0.4" />
        {[0.5,1.0,1.5,2.0,2.5].map((dy,i)=> <line key={i} y1={y+T*dy} x1={x+T*0.2} y2={y+T*dy} x2={x+T*0.8} stroke="#3a2818" strokeWidth="0.3" />)}
      </g>;
      case "razor-h": return <g key={k} pointerEvents="none">
        <line x1={x} y1={cy} x2={x+T*3.9} y2={cy} stroke="#aaaaaa" strokeWidth="0.6" strokeDasharray="2,1" />
        <line x1={x} y1={cy-1.5} x2={x+T*3.9} y2={cy-1.5} stroke="#666" strokeWidth="0.4" strokeDasharray="2,1" />
      </g>;
      case "razor-v": return <g key={k} pointerEvents="none">
        <line x1={cx} y1={y} x2={cx} y2={y+T*3.9} stroke="#aaaaaa" strokeWidth="0.6" strokeDasharray="2,1" />
        <line x1={cx-1.5} y1={y} x2={cx-1.5} y2={y+T*3.9} stroke="#666" strokeWidth="0.4" strokeDasharray="2,1" />
      </g>;
      case "crater": return <g key={k} pointerEvents="none">
        <circle cx={cx} cy={cy} r={T*0.45} fill="#222216" />
        <circle cx={cx} cy={cy} r={T*0.32} fill="#0a0a08" />
      </g>;
      case "flag": return <g key={k} pointerEvents="none">
        <rect x={cx-0.5} y={y} width={1} height={T} fill="#3a3a3a" />
        <rect x={cx} y={y+1} width={T*0.5} height={T*0.3} fill="#5a6b2a" />
      </g>;
      default: return null;
    }
  };

  // Render road markings
  const renderRoads = (segIdx) => {
    const ox = segOffsetX(segIdx);
    const oy = PAD_TOP;
    const elements = [];
    // ground = grass everywhere; per-segment hue varies subtly
    const grassBase  = segIdx === 0 ? "#3e6a22" : segIdx === 1 ? "#3a6020" : segIdx === 2 ? "#3a5a1c" : segIdx === 3 ? "#46782a" : "#446020";
    const grassHi    = segIdx === 0 ? "#5a9028" : segIdx === 1 ? "#558528" : segIdx === 2 ? "#557a22" : segIdx === 3 ? "#62982e" : "#5a7a26";
    const grassDk    = segIdx === 0 ? "#284a14" : segIdx === 1 ? "#264418" : segIdx === 2 ? "#28401a" : segIdx === 3 ? "#2e5418" : "#2e441a";
    elements.push(<rect key="g" x={ox} y={oy} width={SEG_W} height={SEG_H} fill={grassBase} />);
    // dithered grass texture: alternating tile-corner highlights + dark patches
    const rng = mulberry32(segIdx*99 + 7);
    for (let i = 0; i < 320; i++) {
      const sx = ox + Math.floor(rng()*48)*TILE + Math.floor(rng()*8);
      const sy = oy + Math.floor(rng()*48)*TILE + Math.floor(rng()*8);
      elements.push(<rect key={"sh"+i} x={sx} y={sy} width={1.4} height={1.4} fill={grassHi} fillOpacity="0.85" />);
    }
    for (let i = 0; i < 180; i++) {
      const sx = ox + Math.floor(rng()*48)*TILE + Math.floor(rng()*8);
      const sy = oy + Math.floor(rng()*48)*TILE + Math.floor(rng()*8);
      elements.push(<rect key={"sd"+i} x={sx} y={sy} width={1.4} height={1.4} fill={grassDk} fillOpacity="0.7" />);
    }
    // grass tufts: small Y/V shapes
    for (let i = 0; i < 90; i++) {
      const sx = ox + rng()*SEG_W;
      const sy = oy + rng()*SEG_H;
      elements.push(<rect key={"tfa-"+i} x={sx} y={sy} width={0.8} height={2.2} fill={grassDk} fillOpacity="0.7" />);
      elements.push(<rect key={"tfb-"+i} x={sx+1.2} y={sy+0.4} width={0.8} height={1.8} fill={grassDk} fillOpacity="0.6" />);
    }
    // sidewalks
    elements.push(<rect key="sw-ht" x={ox} y={oy + (ROAD_H_TOP-1)*TILE} width={SEG_W} height={TILE} fill="#888888" />);
    elements.push(<rect key="sw-hb" x={ox} y={oy + (ROAD_H_BOT+1)*TILE} width={SEG_W} height={TILE} fill="#888888" />);
    elements.push(<rect key="sw-vl" x={ox + (ROAD_V_LEFT-1)*TILE} y={oy} width={TILE} height={SEG_H} fill="#888888" />);
    elements.push(<rect key="sw-vr" x={ox + (ROAD_V_RIGHT+1)*TILE} y={oy} width={TILE} height={SEG_H} fill="#888888" />);
    // sidewalk seams
    for (let k = 1; k < 48; k += 2) {
      elements.push(<line key={"sht"+k} x1={ox + k*TILE} y1={oy + (ROAD_H_TOP-1)*TILE} x2={ox + k*TILE} y2={oy + ROAD_H_TOP*TILE} stroke="#5a5a5a" strokeWidth="0.3" />);
      elements.push(<line key={"shb"+k} x1={ox + k*TILE} y1={oy + (ROAD_H_BOT+1)*TILE} x2={ox + k*TILE} y2={oy + (ROAD_H_BOT+2)*TILE} stroke="#5a5a5a" strokeWidth="0.3" />);
    }
    // road surface
    elements.push(<rect key="rh" x={ox} y={oy + ROAD_H_TOP*TILE} width={SEG_W} height={(ROAD_H_BOT-ROAD_H_TOP+1)*TILE} fill="#2a2a2a" />);
    elements.push(<rect key="rv" x={ox + ROAD_V_LEFT*TILE} y={oy} width={(ROAD_V_RIGHT-ROAD_V_LEFT+1)*TILE} height={SEG_H} fill="#2a2a2a" />);
    // road dashed center line (horizontal)
    const cyR = oy + (ROAD_H_TOP+ROAD_H_BOT+1)/2 * TILE;
    for (let k = 0; k < 24; k++) {
      const dx = ox + k*2*TILE + TILE*0.4;
      // skip near vertical road
      if (dx + TILE*1.2 > ox + ROAD_V_LEFT*TILE && dx < ox + (ROAD_V_RIGHT+1)*TILE) continue;
      elements.push(<rect key={"dh"+k} x={dx} y={cyR-0.7} width={TILE*1.2} height={1.4} fill="#ffd93d" fillOpacity="0.7" />);
    }
    // vertical center line
    const cxR = ox + (ROAD_V_LEFT+ROAD_V_RIGHT+1)/2 * TILE;
    for (let k = 0; k < 24; k++) {
      const dy = oy + k*2*TILE + TILE*0.4;
      if (dy + TILE*1.2 > oy + ROAD_H_TOP*TILE && dy < oy + (ROAD_H_BOT+1)*TILE) continue;
      elements.push(<rect key={"dv"+k} x={cxR-0.7} y={dy} width={1.4} height={TILE*1.2} fill="#ffd93d" fillOpacity="0.7" />);
    }
    // crosswalks at intersection
    const ixL = ox + ROAD_V_LEFT*TILE - TILE*0.1;
    const ixR = ox + (ROAD_V_RIGHT+1)*TILE - TILE*0.9;
    for (let k = 0; k < 4; k++) {
      elements.push(<rect key={"cwt"+k} x={ox + (ROAD_V_LEFT+k)*TILE + TILE*0.05} y={oy + (ROAD_H_TOP-1)*TILE + TILE*0.1} width={TILE*0.3} height={TILE*0.8} fill="#fff" fillOpacity="0.6" />);
      elements.push(<rect key={"cwb"+k} x={ox + (ROAD_V_LEFT+k)*TILE + TILE*0.05} y={oy + (ROAD_H_BOT+1)*TILE + TILE*0.1} width={TILE*0.3} height={TILE*0.8} fill="#fff" fillOpacity="0.6" />);
    }
    return elements;
  };

  return (
    <React.Fragment>
      <div className="header">
        <div>
          <h1>zombiegame2 — World Map</h1>
          <div className="sub">5 segments · 240×48 tiles · 32px tile · retro 2D top-down</div>
        </div>
        <div className="right">
          {SEGMENTS.filter(s => unlockAll || s.status === "unlocked").length} / {SEGMENTS.length} segments unlocked<br/>
          {SEGMENTS.reduce((a,s) => a + s.zombies.length, 0)} zombies · {SEGMENTS.reduce((a,s) => a + s.loot.length, 0)} loot · {GATES.length} gates
        </div>
      </div>

      <div className="toolbar">
        <div className="group">
          <label><input type="checkbox" checked={showSpawns} onChange={e=>setShowSpawns(e.target.checked)} />Spawns</label>
          <label><input type="checkbox" checked={showGates} onChange={e=>setShowGates(e.target.checked)} />Gates</label>
          <label><input type="checkbox" checked={showPoiLabels} onChange={e=>setShowPoiLabels(e.target.checked)} />POI labels</label>
        </div>
        <button className="btn primary" onClick={copyJson}>📋 Copy Tiled JSON</button>
        <button className={"btn " + (unlockAll?"danger":"success")} onClick={()=>setUnlockAll(!unlockAll)}>
          {unlockAll ? "🔒 Re-lock segments" : "🔓 Simulate unlock all"}
        </button>
      </div>

      <div className="map-frame">
        <svg viewBox={`0 0 ${VB_W} ${VB_H}`} xmlns="http://www.w3.org/2000/svg" shapeRendering="crispEdges">
          <rect x="0" y="0" width={VB_W} height={VB_H} fill="#0c0c0c" />

          {/* per-segment rendering */}
          {SEGMENTS.map((seg, i) => {
            const ox = segOffsetX(i);
            const locked = segIsLocked(seg);
            const isSel = selected === seg.id;
            return (
              <g key={seg.id}>
                {/* clip everything inside the segment */}
                <clipPath id={`clip-${seg.id}`}>
                  <rect x={ox} y={PAD_TOP} width={SEG_W} height={SEG_H} />
                </clipPath>
                <g clipPath={`url(#clip-${seg.id})`}>
                  {renderRoads(i)}
                  {/* PROPS layer (under buildings) */}
                  {seg.props.filter(p => !["lamp","sign","flag"].includes(p.kind)).map((p, idx) => renderProp(i, p, idx))}
                  {/* BUILDINGS layer */}
                  {seg.buildings.map(b => renderBuilding(i, b))}
                  {/* lamps/signs/flags above */}
                  {seg.props.filter(p => ["lamp","sign","flag"].includes(p.kind)).map((p, idx) => renderProp(i, p, "ab"+idx))}
                  {/* spawns */}
                  {showSpawns && (
                    <g pointerEvents="none">
                      {seg.zombies.map((z, k) => {
                        const zx = ox + z.x*TILE + TILE/2;
                        const zy = PAD_TOP + z.y*TILE + TILE/2;
                        return <g key={"z"+k}>
                          <circle cx={zx} cy={zy} r={TILE*0.45} fill="#c026d3" stroke="#000" strokeWidth="0.4" />
                          <text x={zx} y={zy + TILE*0.18} textAnchor="middle" fontSize={TILE*0.65} fill="#000" fontFamily="Courier New" fontWeight="bold">Z</text>
                        </g>;
                      })}
                      {seg.loot.map((l, k) => {
                        const lx = ox + l.x*TILE;
                        const ly = PAD_TOP + l.y*TILE;
                        return <g key={"l"+k}>
                          <rect x={lx + TILE*0.15} y={ly + TILE*0.15} width={TILE*0.7} height={TILE*0.7} fill={RARITY_COLORS[l.rarity]} stroke="#000" strokeWidth="0.4" />
                          <text x={lx + TILE/2} y={ly + TILE*0.7} textAnchor="middle" fontSize={TILE*0.55} fill="#000" fontFamily="Courier New" fontWeight="bold">$</text>
                        </g>;
                      })}
                      {seg.player_spawn && (() => {
                        const px = ox + seg.player_spawn.x*TILE + TILE/2;
                        const py = PAD_TOP + seg.player_spawn.y*TILE + TILE/2;
                        return <g>
                          <circle cx={px} cy={py} r={TILE*0.6} fill="none" stroke="#4ade80" strokeWidth="2" />
                          <circle cx={px} cy={py} r={TILE*0.35} fill="#4ade80" stroke="#000" strokeWidth="0.4" />
                          <text x={px} y={py + TILE*0.2} textAnchor="middle" fontSize={TILE*0.55} fill="#000" fontFamily="Courier New" fontWeight="bold">P</text>
                        </g>;
                      })()}
                    </g>
                  )}
                  {/* POI markers */}
                  <g pointerEvents="none">
                    {seg.pois.map(p => {
                      const px = ox + p.x*TILE + TILE/2;
                      const py = PAD_TOP + p.y*TILE + TILE/2;
                      return <g key={p.id}>
                        <circle cx={px} cy={py} r={TILE*0.9} fill="#ffd93d" fillOpacity="0.25" />
                        <text x={px} y={py + TILE*0.25} textAnchor="middle" fontSize={TILE*1.4}>{p.emoji}</text>
                        {showPoiLabels && (
                          <React.Fragment>
                            <rect x={px - 30} y={py + TILE*0.9} width={60} height={10} fill="#0a0a0a" fillOpacity="0.85" stroke="#ffd93d" strokeWidth="0.3" />
                            <text x={px} y={py + TILE*0.9 + 7.5} textAnchor="middle" fontSize="7" fill="#ffd93d" fontFamily="Courier New">{p.name}</text>
                          </React.Fragment>
                        )}
                      </g>;
                    })}
                  </g>
                </g>

                {/* segment frame + label header strip */}
                <rect x={ox} y={PAD_TOP - 18} width={SEG_W} height="18" fill="#000" />
                <text x={ox + 6} y={PAD_TOP - 5} fill="#ffd93d" fontFamily="Courier New" fontSize="11" fontWeight="bold">{String(seg.id).padStart(2,"0")}</text>
                <text x={ox + 26} y={PAD_TOP - 5} fill="#e5e5e5" fontFamily="Courier New" fontSize="10">{seg.name.toUpperCase()}</text>
                <text x={ox + SEG_W - 6} y={PAD_TOP - 5} textAnchor="end" fill="#ffd93d" fontFamily="Courier New" fontSize="9">{"★".repeat(seg.difficulty) + "☆".repeat(5-seg.difficulty)}</text>

                {/* footer status strip */}
                <rect x={ox} y={PAD_TOP + SEG_H} width={SEG_W} height="14" fill="#000" />
                <text x={ox + 6} y={PAD_TOP + SEG_H + 10} fill={locked?"#c026d3":"#4ade80"} fontFamily="Courier New" fontSize="9">{locked?"▒ LOCKED":"▓ UNLOCKED"}</text>
                <text x={ox + SEG_W - 6} y={PAD_TOP + SEG_H + 10} textAnchor="end" fill="#aaa" fontFamily="Courier New" fontSize="9">Z:{seg.zombies.length} · L:{seg.loot.length} · B:{seg.buildings.length}</text>

                {/* selection / hover frame */}
                <rect className={"seg-rect" + (isSel ? " selected" : "")}
                  x={ox} y={PAD_TOP} width={SEG_W} height={SEG_H}
                  fill="transparent"
                  stroke={isSel ? "#ffd93d" : "#000"} strokeWidth={isSel?2:1}
                  onMouseEnter={(e) => setHovered({segId: seg.id, x: e.clientX, y: e.clientY})}
                  onMouseMove={(e) => setHovered({segId: seg.id, x: e.clientX, y: e.clientY})}
                  onMouseLeave={() => setHovered(null)}
                  onClick={() => setSelected(seg.id)}
                />
                {/* lock overlay */}
                {locked && (
                  <g pointerEvents="none">
                    <rect x={ox} y={PAD_TOP} width={SEG_W} height={SEG_H} fill="rgba(0,0,0,0.55)" />
                    <text x={ox + SEG_W/2} y={PAD_TOP + SEG_H/2 + 22} textAnchor="middle" fontSize="64">🔒</text>
                  </g>
                )}
              </g>
            );
          })}

          {/* gates between segments */}
          {showGates && GATES.map(g => {
            const i = g.between - 1;
            const sx = segOffsetX(i) + SEG_W;
            const cy = PAD_TOP + (ROAD_H_TOP+ROAD_H_BOT+1)/2 * TILE;
            const open = !segIsLocked(SEGMENTS[i]) && !segIsLocked(SEGMENTS[i+1]);
            const stroke = open ? "#ffd93d" : "#5a3a0a";
            const sym = g.type === "bridge" ? "═" : g.type === "tunnel" ? "○" : g.type === "breach" ? "✂" : "▒";
            return <g key={g.id} pointerEvents="none">
              <rect x={sx-6} y={cy-12} width={12} height={24} fill="#000" stroke={stroke} strokeWidth="1.5" />
              <text x={sx} y={cy+4} textAnchor="middle" fontSize="11" fill={stroke} fontFamily="Courier New" fontWeight="bold">{sym}</text>
              <text x={sx} y={cy-16} textAnchor="middle" fontSize="7" fill="#888" fontFamily="Courier New">{g.type}</text>
            </g>;
          })}
        </svg>

        {hovered && (() => {
          const seg = SEGMENTS.find(s => s.id === hovered.segId);
          const locked = segIsLocked(seg);
          const tx = Math.min(window.innerWidth - 340, hovered.x + 14);
          const ty = Math.min(window.innerHeight - 220, hovered.y + 14);
          return (
            <div className="tooltip" style={{ left: tx, top: ty }}>
              <div className="ttl">{String(seg.id).padStart(2,"0")} · {seg.name}</div>
              <div className="row"><span className="k">Polish</span><span>{seg.pl_name}</span></div>
              <div className="row"><span className="k">Difficulty</span><span className="stars">{"★".repeat(seg.difficulty)+"☆".repeat(5-seg.difficulty)}</span></div>
              <div className="row"><span className="k">Buildings</span><span>{seg.buildings.length}</span></div>
              <div className="row"><span className="k">Zombies</span><span>{seg.zombies.length}</span></div>
              <div className="row"><span className="k">Loot</span><span>{seg.loot.length}</span></div>
              <div className="row"><span className="k">POI</span><span>{seg.pois.length}</span></div>
              <div className="row"><span className="k">Status</span><span className={locked?"status-locked":"status-unlocked"}>{locked?"▒ LOCKED":"▓ UNLOCKED"}</span></div>
              <div className="unlock">↳ {seg.unlock_condition}</div>
            </div>
          );
        })()}
      </div>

      <div className="legend">
        <div className="item"><span className="swatch" style={{background:"#4ade80"}}></span>player</div>
        <div className="item"><span className="swatch" style={{background:"#c026d3"}}></span>zombie</div>
        <div className="item"><span className="swatch" style={{background:"#aaa"}}></span>loot · common</div>
        <div className="item"><span className="swatch" style={{background:"#4ade80"}}></span>uncommon</div>
        <div className="item"><span className="swatch" style={{background:"#60a5fa"}}></span>rare</div>
        <div className="item"><span className="swatch" style={{background:"#c026d3"}}></span>epic</div>
        <div className="item"><span className="swatch" style={{background:"#ffd93d"}}></span>POI / gate (open)</div>
        <div className="item"><span className="swatch" style={{background:"#5a3a0a"}}></span>gate (sealed)</div>
        <div className="item"><span className="swatch" style={{background:"#a87b4a"}}></span>house</div>
        <div className="item"><span className="swatch" style={{background:"#7a5a40"}}></span>factory</div>
        <div className="item"><span className="swatch" style={{background:"#e8eef4"}}></span>hospital</div>
      </div>

      {/* detail panel */}
      <div className="panel">
        <h2>SEG {String(sel.id).padStart(2,"0")} · {sel.name}</h2>
        <div className="meta">
          <span>PL: <b>{sel.pl_name}</b></span>
          <span>Difficulty: <b>{"★".repeat(sel.difficulty)+"☆".repeat(5-sel.difficulty)}</b></span>
          <span>Status: <b style={{color: segIsLocked(sel)?"#c026d3":"#4ade80"}}>{segIsLocked(sel)?"LOCKED":"UNLOCKED"}</b></span>
          <span>Theme: <b style={{color: sel.theme_color}}>■</b> {sel.theme_color}</span>
          <span>Unlock: <b>{sel.unlock_condition}</b></span>
        </div>
        <div className="grid-3">
          <div className="col">
            <h3>Buildings ({sel.buildings.length})</h3>
            <ul>{sel.buildings.map(b => <li key={b.id}><span>{b.name}</span><span className="tag">{b.type}</span></li>)}</ul>
          </div>
          <div className="col">
            <h3>Spawns</h3>
            <ul>
              {sel.player_spawn && <li><span style={{color:"#4ade80"}}>● Player</span><span>({sel.player_spawn.x},{sel.player_spawn.y})</span></li>}
              {sel.zombies.map((z,i)=> <li key={i}><span style={{color:"#c026d3"}}>● Zombie #{i+1}</span><span>({z.x},{z.y})</span></li>)}
            </ul>
          </div>
          <div className="col">
            <h3>Loot ({sel.loot.length})</h3>
            <ul>{sel.loot.map((l,i)=> <li key={i} className={"rarity-"+l.rarity}><span>{l.item}</span><span className="tag">{l.rarity}</span></li>)}</ul>
          </div>
        </div>
        <div style={{marginTop:12}}>
          <h3 style={{fontSize:11,color:"#ffd93d",textTransform:"uppercase",letterSpacing:1,margin:"0 0 6px 0"}}>Points of Interest</h3>
          {sel.pois.map(p => <div className="poi-card" key={p.id}>
            <div className="pname">{p.emoji} {p.name} <span style={{color:"#666",fontSize:9}}>@ ({p.x},{p.y})</span></div>
            <div style={{color:"#bbb"}}>{p.desc}</div>
          </div>)}
        </div>
      </div>

      <div className="next-steps">
        <h3>Next steps for Claude Code</h3>
        <ol>
          <li>Parse <code>mapData</code> in Rust with the <code>tiled</code> crate; deserialize via <code>serde_json::from_str::&lt;Map&gt;()</code> and read <code>segments_meta</code> from <code>map.properties</code>.</li>
          <li>Lazy-load segments as 1536×1536 chunks: each tilelayer's <code>x</code> offset (<code>seg_id*48</code>) gives world-space placement. Spawn entities only for the active + adjacent unlocked segment.</li>
          <li>Wire <code>gate</code> objects into the progression system: read <code>gate_id</code> + <code>connects_segments</code>, gate transit on <code>game_flags[gate_id] == open</code>.</li>
          <li>Use <code>unlock_condition</code> as game-flag definitions: e.g. <code>flag::FactoryKeycard</code> picks up the rare loot in segment 2 → unlocks segment 3.</li>
          <li>Build collision grid from tilelayers: tile <code>4</code> (building_wall) is solid, <code>9</code> (door) is conditional, <code>2</code> (road) and <code>1</code> (grass) are walkable.</li>
        </ol>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
